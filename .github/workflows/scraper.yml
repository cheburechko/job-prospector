name: Scraper
on:
  push:
    branches:
      - main
    paths:
      - 'scraper/**'
      - '.github/workflows/scraper.yml'
  pull_request:
    paths:
      - 'scraper/**'
      - '.github/workflows/scraper.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper/src
    steps:
      - uses: actions/checkout@v6
      - name: Run Ruff check
        uses: astral-sh/ruff-action@v3
      - name: Run Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: format --diff

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: scraper/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scraper/requirements.txt') }}
      - name: Install Playwright dependencies
        run: python -m playwright install --with-deps chromium
      - name: Run unit tests
        run: pytest src/test/unit -v
      - name: Run integration tests
        run: pytest src/test/integration -v -m integration

  push-image:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::894608133151:role/scraper-gha-ecr-push
          aws-region: eu-central-1
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: scraper
          file: scraper/docker/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/job-prospector/scraper:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-plan:
    if: github.event_name == 'pull_request'
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper/terraform
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::894608133151:role/scraper-gha-terraform
          aws-region: eu-central-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
      - name: Terraform init
        run: terraform init -input=false
      - name: Terraform plan
        run: terraform plan -input=false -no-color

  terraform-apply:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [push-image]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper/terraform
    env:
      TF_VAR_image_tag: ${{ needs.push-image.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::894608133151:role/scraper-gha-terraform
          aws-region: eu-central-1
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
      - name: Terraform init
        run: terraform init -input=false
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
